# Installer-ISO boot args (this blueprint is only used for the bootc-installer
# ISO, not the installed system). Force the graphical Anaconda installer onto
# the VGA console so it renders in the browser VNC: inst.graphical appears after
# image-builder's default inst.text on the cmdline and the later display-mode
# arg wins. No serial console here on purpose -- the installed system gets
# console=ttyS0 from the payload image's kargs.d/00-console.toml, so adding it
# to the installer only sent Anaconda to the serial console (the container's
# stdout) instead of the VNC display.
[customizations.kernel]
append = "console=ttyS0,115200n8 console=tty1 inst.text inst.graphical"

[[customizations.user]]
name = "annie"
description = "Annie Ehler"
password = "$6$vA1r8t0lbZTB9R4b$Z3Zx.TdIv32dFQdVjyZ/P/..Mmh9x3oCTZqKD/q2fvRBP.qnrq6yQILJW9.uMcGpFynW3O9LV7vHcZTXd.dRN."
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMTijhGkE4C7yFWj0/md4R8EwLaYsyHKLTIOzJM65QHv"
home = "/var/home/annie"
shell = "/usr/bin/bash"
